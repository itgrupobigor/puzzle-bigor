<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba Google Sheets</title>
</head>
<body>
  <h1>Prueba de envío a Google Sheets</h1>
  <button onclick="sendTest()">Enviar datos de prueba</button>

  <script>
    async function sendTest() {
      const scriptURL = "https://script.google.com/macros/s/AKfycbyBjYM4979G0AjngnqKiw0SgHrqMezl07BLXa6dRaM9RQ0oXzClpTMT8WJ6n5wIts68tQ/exec"; // pega aquí la URL del Web App
      const data = {
        email: "test@ejemplo.com",
        name: "JugadorPrueba",
        image: "img1.jpg",
        moves: 12,
        time: 45
      };

      const response = await fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(data),
        headers: { "Content-Type": "application/json" }
      });

      const result = await response.text();
      alert("Respuesta del servidor: " + result);
    }
  </script>
</body>
</html>
